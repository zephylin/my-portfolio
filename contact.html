<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Zephylin Dusengimana</title>
  <meta name="description" content="Get in touch with Zephylin Dusengimana for opportunities in software development, AI/ML engineering, or research collaboration.">
  <link rel="icon" href="./assets/images/logo.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/style.css">

  <!-- EmailJS SDK — sends emails without a backend server -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body>
  <div id="nav-placeholder"></div>

  <main class="section" style="padding-top: calc(var(--nav-height) + var(--space-2xl));">
    <div class="container">
      <h1 class="section-title">Get In Touch</h1>
      <p class="section-subtitle">
        I'm open to new opportunities, collaborations, and conversations. 
        Whether it's about a role, a research idea, or just saying hello — feel free to reach out.
      </p>

      <div class="contact-grid">
        <!-- Left: Contact Form (moved up for better UX) -->
        <form class="contact-form" id="contact-form">
          <div class="form-group">
            <label for="name">Your Name</label>
            <input type="text" id="name" name="from_name" required placeholder="John Doe">
          </div>

          <div class="form-group">
            <label for="email">Your Email</label>
            <input type="email" id="email" name="from_email" required placeholder="john@example.com">
          </div>

          <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" required placeholder="Opportunity / Collaboration / Hello">
          </div>

          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" required placeholder="Your message..."></textarea>
          </div>

          <!-- Honeypot: hidden field to catch spam bots -->
          <div class="form-honeypot" aria-hidden="true">
            <input type="text" name="honeypot" tabindex="-1" autocomplete="off">
          </div>

          <button type="submit" class="btn btn-primary" id="submit-btn">Send Message</button>
          <div class="form-status" id="form-status"></div>
        </form>

        <!-- Right: Contact Info -->
        <div>
          <div class="contact-info-list">
            <div class="contact-info-item">
              <div class="icon">✉</div>
              <div class="info">
                <h4>Email</h4>
                <a href="mailto:dzephylin@gmail.com">dzephylin@gmail.com</a>
              </div>
            </div>

            <div class="contact-info-item">
              <div class="icon">📱</div>
              <div class="info">
                <h4>Phone</h4>
                <p>+1 (405) 856-8895</p>
              </div>
            </div>

            <div class="contact-info-item">
              <div class="icon">📍</div>
              <div class="info">
                <h4>Location</h4>
                <p>Oklahoma City, OK, USA</p>
              </div>
            </div>
          </div>

          <!-- Social Links -->
          <div class="social-links">
            <a href="https://www.linkedin.com/in/zephylin-d/" target="_blank" rel="noopener noreferrer" title="LinkedIn">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
              </svg>
            </a>
            <a href="https://github.com/zephylin" target="_blank" rel="noopener noreferrer" title="GitHub">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
              </svg>
            </a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="./assets/js/main.js"></script>
  <script src="./assets/js/contact.js"></script>
  <script>initPage('contact');</script>
</body>
</html>
